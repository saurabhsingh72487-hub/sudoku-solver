<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Solver</title>
  <link rel="stylesheet" href="/public/style.css" />
</head>
<body>
  <main>
    <h1>Sudoku Solver</h1>

    <section>
      <h2>Solve Puzzle</h2>

      <textarea
        id="puzzle"
        rows="8"
        placeholder="Enter an 81-character puzzle string using numbers 1-9 and dots for empty cells"
      ></textarea>

      <button id="solve-button">Solve</button>

      <pre id="solution-output"></pre>
    </section>

    <section>
      <h2>Check Placement</h2>

      <input id="coordinate" type="text" placeholder="Coordinate e.g. A2" />
      <input id="value" type="text" placeholder="Value e.g. 3" />

      <button id="check-button">Check</button>

      <pre id="check-output"></pre>
    </section>
  </main>

  <script src="/public/client.js"></script>
</body>
</html>
